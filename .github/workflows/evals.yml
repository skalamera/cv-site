name: Promptfoo Evals

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Promptfoo Evals
        env:
          # The GitHub action needs the Gemini API key to act as the "Judge" LLM
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx promptfoo eval
        
      - name: Output Eval Results
        run: |
          echo "Prompt evaluations completed successfully!"
          # Optionally generate a JSON/HTML report
          # npx promptfoo eval -o output.html
